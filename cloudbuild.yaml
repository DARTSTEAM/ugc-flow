steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/ugc-flow:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ugc-flow:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/ugc-flow']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ugc-flow
      - '--image=gcr.io/$PROJECT_ID/ugc-flow:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/ugc-flow:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ugc-flow:latest'

options:
  logging: CLOUD_LOGGING_ONLY
